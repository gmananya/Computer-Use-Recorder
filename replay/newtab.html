<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Tab (Simulated)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --fg: #1f1f1f;
      --muted: #6b7280;
      --bg: #fff;
      --ring: #2563eb33;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#111; --fg:#e5e7eb; --muted:#9ca3af; --ring:#60a5fa33; }
    }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: grid; place-items: center;
    }
    .wrap { width: min(720px, 90vw); text-align: center; }
    .logo { font-size: 22px; letter-spacing: .2px; margin-bottom: 18px; opacity: .85; }
    .omni {
      display: flex; align-items: center; gap: 10px;
      background: #fff0; border: 1px solid #d1d5db; border-radius: 24px;
      padding: 10px 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    input[type="text"] {
      flex: 1; border: 0; outline: 0; font-size: 16px; background: transparent; color: var(--fg);
    }
    input[type="text"]::placeholder { color: var(--muted); }
    .omni:focus-within { box-shadow: 0 0 0 4px var(--ring); border-color: transparent; }
    .hint { margin-top: 10px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">New Tab</div>
    <div class="omni">
      <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.71.71l.27.28v.79l5 5L20.49 19l-5-5zm-6 0A4.5 4.5 0 1114 9.5 4.505 4.505 0 019.5 14z"/></svg>
      <input id="omnibox" type="text" placeholder="Search or type a URL" autocomplete="off">
    </div>
    <div class="hint">Simulated page for replay. Keystrokes from <code>chrome.exe.json</code> appear here.</div>
  </div>

  <script>
    // Exposed API the replayer calls
    window.setOmnibox = (val) => {
      const el = document.getElementById('omnibox');
      el.value = val ?? '';
      el.focus();
      // optional: fire input events if you ever need them
      el.dispatchEvent(new Event('input', {bubbles:true}));
      el.dispatchEvent(new Event('change', {bubbles:true}));
    };
  </script>
</body>
</html>
